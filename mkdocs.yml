site_name: gw_fopt User Guide
site_description: Gravitational-wave spectra from first-order phase-transition bubble collisions
repo_url: https://github.com/hoquoctrung/gw_fopt
repo_name: hoquoctrung/gw_fopt

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Installation: installation.md
  - Workflows:
      - Two Bubbles: two_bubbles.md
      - Lattice Bubbles: lattice_bubbles.md
      - Generalized Bulk-Flow: generalized_bulkflow.md
      - Sampling Utilities: sample.md
  - API Reference:
      - Python API: api/python.md
      - Rust API: api/rust.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css
